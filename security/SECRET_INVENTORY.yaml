version: 1.0
owner: LIVING_BRAIN
priority: P0
status: ACTIVE

principles:
  - no_plaintext_secrets_in_production
  - secret_values_must_not_be_logged
  - exposed_secrets_are_treated_as_compromised
  - google_secret_manager_is_secret_source_of_truth
  - service_account_json_must_be_removed_in_favor_of_iam_native_auth

secrets:
  OPENAI_API_KEY:
    severity: CRITICAL
    target_secret: thos-openai-api-key
    rotate_required: true
    migration_strategy: secret_manager_binding
    cloud_run_env: OPENAI_API_KEY

  GITHUB_TOKEN:
    severity: CRITICAL
    target_secret: thos-github-pat
    rotate_required: true
    migration_strategy: secret_manager_binding
    cloud_run_env: GITHUB_TOKEN

  GOOGLE_SERVICE_ACCOUNT_JSON:
    severity: CRITICAL
    target_secret: null
    rotate_required: true
    migration_strategy: remove_and_use_iam_native_auth
    cloud_run_env: GOOGLE_SERVICE_ACCOUNT_JSON
    final_state: removed

  GOOGLE_REFRESH_TOKEN:
    severity: CRITICAL
    target_secret: thos-google-refresh-token
    rotate_required: true
    migration_strategy: secret_manager_binding
    cloud_run_env: GOOGLE_REFRESH_TOKEN

  GOOGLE_CLIENT_SECRET:
    severity: CRITICAL
    target_secret: thos-google-client-secret
    rotate_required: true
    migration_strategy: secret_manager_binding
    cloud_run_env: GOOGLE_CLIENT_SECRET

  QDRANT_API_KEY:
    severity: HIGH
    target_secret: thos-qdrant-api-key
    rotate_required: true
    migration_strategy: secret_manager_binding
    cloud_run_env: QDRANT_API_KEY

  MCP_API_KEY:
    severity: HIGH
    target_secret: thos-mcp-api-key
    rotate_required: true
    migration_strategy: secret_manager_binding
    cloud_run_env: MCP_API_KEY

  DRIVE_FOLDER_ID:
    severity: MEDIUM
    target_secret: null
    rotate_required: false
    migration_strategy: keep_as_non_secret_config
    cloud_run_env: DRIVE_FOLDER_ID

  APPS_SCRIPT_CREATE_DOCUMENT_URL:
    severity: MEDIUM
    target_secret: null
    rotate_required: false
    migration_strategy: review_then_decide
    cloud_run_env: APPS_SCRIPT_CREATE_DOCUMENT_URL

next_task: create_secret_migration_plan
