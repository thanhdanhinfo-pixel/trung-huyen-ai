version: 1.0
owner: LIVING_BRAIN
priority: P0
status: ACTIVE
source_inventory: security/SECRET_INVENTORY.yaml

objective: >
  Remove plaintext secrets from Cloud Run production configuration and migrate
  secret-backed environment variables to Google Secret Manager without
  interrupting production.

rules:
  - migrate_one_secret_at_a_time
  - verify_after_each_binding
  - do_not_log_secret_values
  - do_not_store_secret_values_in_repository
  - rotate_exposed_credentials_before_or_during_cutover
  - remove_plaintext_only_after_secret_binding_is_verified
  - google_service_account_json_final_state_must_be_removed

migration_order:
  - id: 1
    env: MCP_API_KEY
    target_secret: thos-mcp-api-key
    action: secret_manager_bind
    risk: LOW_RUNTIME_IMPACT
    verify:
      - cloud_run_revision_ready
      - app_import_ok

  - id: 2
    env: QDRANT_API_KEY
    target_secret: thos-qdrant-api-key
    action: secret_manager_bind
    risk: MEDIUM_RUNTIME_IMPACT
    verify:
      - cloud_run_revision_ready
      - vector_runtime_health_check

  - id: 3
    env: OPENAI_API_KEY
    target_secret: thos-openai-api-key
    action: rotate_then_secret_manager_bind
    risk: HIGH_RUNTIME_IMPACT
    verify:
      - cloud_run_revision_ready
      - openai_client_initialization_ok

  - id: 4
    env: GITHUB_TOKEN
    target_secret: thos-github-pat
    action: rotate_then_secret_manager_bind
    risk: HIGH_RUNTIME_IMPACT
    verify:
      - cloud_run_revision_ready
      - github_runtime_status_ok
      - github_read_write_smoke_test

  - id: 5
    env: GOOGLE_CLIENT_SECRET
    target_secret: thos-google-client-secret
    action: rotate_then_secret_manager_bind
    risk: HIGH_RUNTIME_IMPACT
    verify:
      - cloud_run_revision_ready
      - google_oauth_flow_not_broken

  - id: 6
    env: GOOGLE_REFRESH_TOKEN
    target_secret: thos-google-refresh-token
    action: rotate_then_secret_manager_bind
    risk: HIGH_RUNTIME_IMPACT
    verify:
      - cloud_run_revision_ready
      - drive_access_ok

  - id: 7
    env: GOOGLE_SERVICE_ACCOUNT_JSON
    target_secret: null
    action: remove_and_replace_with_iam_native_auth
    risk: CRITICAL_RUNTIME_IMPACT
    verify:
      - cloud_run_service_account_has_required_iam
      - drive_access_ok_without_private_key_json
      - docs_access_ok_without_private_key_json
      - cloud_apis_access_ok_without_private_key_json

non_secret_config:
  DRIVE_FOLDER_ID:
    action: keep_as_plain_config
    reason: identifier_not_secret

  GITHUB_OWNER:
    action: keep_as_plain_config
    reason: repository_owner_identifier_not_secret

  GITHUB_REPO:
    action: keep_as_plain_config
    reason: repository_name_not_secret

  GITHUB_BRANCH:
    action: keep_as_plain_config
    reason: branch_name_not_secret

rollback_strategy:
  - keep_previous_cloud_run_revision_available_until_validation_passes
  - rollback_traffic_to_previous_ready_revision_if_startup_fails
  - never_print_secret_values_during_rollback

completion_criteria:
  - cloud_run_plaintext_secret_env_count_is_zero
  - all_required_secret_bindings_use_secret_manager
  - service_account_json_removed
  - latest_cloud_run_revision_ready
  - living_brain_runtime_observation_ok
  - security_audit_passed

next_task: create_security_governance_file
