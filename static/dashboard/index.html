<!DOCTYPE html><html><head><meta charset='utf-8'><title>TRUNG_HUYEN_AI_OS Dashboard</title><style>body{font-family:Arial;background:#0f172a;color:#e2e8f0;margin:20px}h1{color:#38bdf8}section{border:1px solid #334155;border-radius:8px;padding:12px;margin:12px 0;background:#111827}pre{white-space:pre-wrap;font-size:12px}</style></head><body><h1>TRUNG_HUYEN_AI_OS Dashboard v1</h1><section><h2>Health</h2><pre id='health'></pre></section><section><h2>Governance</h2><pre id='gov'></pre></section><section><h2>Policies</h2><pre id='policies'></pre></section><section><h2>Rules</h2><pre id='rules'></pre></section><section><h2>Planner</h2><pre id='planner'></pre></section><section><h2>Workers</h2><pre id='workers'></pre></section><section><h2>Tasks</h2><pre id='tasks'></pre></section><section><h2>Events</h2><pre id='events'></pre></section><script>async function load(id,url){try{document.getElementById(id).textContent=JSON.stringify(await (await fetch(url)).json(),null,2)}catch(e){document.getElementById(id).textContent=e.toString()}}['health','governance','policies','rules','planner','workers','tasks','events'].forEach(k=>load(k,k==='health'?'/system/health':k==='governance'?'/system/governance':k==='policies'?'/system/policies':k==='rules'?'/system/rules':k==='planner'?'/system/planner':k==='workers'?'/system/workers':k==='tasks'?'/system/tasks':'/system/events'));</script></body></html>
