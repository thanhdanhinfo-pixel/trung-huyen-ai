<!DOCTYPE html><html><head><meta charset='utf-8'><title>TRUNG_HUYEN_AI_OS Dashboard</title><style>body{font-family:Arial;background:#0f172a;color:#e2e8f0;margin:20px}h1{color:#38bdf8}section{border:1px solid #334155;border-radius:8px;padding:12px;margin:12px 0;background:#111827}pre{white-space:pre-wrap;font-size:12px;max-height:240px;overflow:auto}</style></head><body><h1>TRUNG_HUYEN_AI_OS Dashboard v2</h1><div>Auto refresh: 5s</div><section><h2>Health</h2><pre id='health'></pre></section><section><h2>Governance</h2><pre id='governance'></pre></section><section><h2>Policies</h2><pre id='policies'></pre></section><section><h2>Rules</h2><pre id='rules'></pre></section><section><h2>Planner</h2><pre id='planner'></pre></section><section><h2>Workers</h2><pre id='workers'></pre></section><section><h2>Tasks</h2><pre id='tasks'></pre></section><section><h2>Events</h2><pre id='events'></pre></section><script>const m={health:'/system/health',governance:'/system/governance',policies:'/system/policies',rules:'/system/rules',planner:'/system/planner',workers:'/system/workers',tasks:'/system/tasks',events:'/system/events/live'};async function refresh(){for(const [k,v] of Object.entries(m)){try{const r=await fetch(v);document.getElementById(k).textContent=JSON.stringify(await r.json(),null,2)}catch(e){document.getElementById(k).textContent=String(e)}}}refresh();setInterval(refresh,5000);</script></body></html>
