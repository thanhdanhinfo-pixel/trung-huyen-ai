<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRUNG HUYEN AI OS</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e5e7eb;
    }
    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    #chat {
      background: #111827;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 16px;
      height: 60vh;
      overflow-y: auto;
      margin-bottom: 16px;
    }
    .msg {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .user {
      background: #1d4ed8;
    }
    .bot {
      background: #1f2937;
    }
    textarea {
      width: 100%;
      height: 90px;
      border-radius: 10px;
      border: 1px solid #374151;
      padding: 12px;
      box-sizing: border-box;
      background: #020617;
      color: #e5e7eb;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: bold;
      font-size: 16px;
    }
    button:disabled {
      background: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TRUNG HUYEN AI OS</h1>
    <p>Bộ não AI kết nối Google Drive và OpenAI.</p>

    <div id="chat"></div>

    <textarea id="question" placeholder="Nhập câu hỏi..."></textarea>
    <button onclick="sendMessage()" id="sendBtn">Gửi câu hỏi</button>
  </div>

  <script>
  const chat = document.getElementById("chat");
  const questionInput = document.getElementById("question");
  const sendBtn = document.getElementById("sendBtn");

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const question = questionInput.value.trim();
    if (!question) return;

    addMessage(question, "user");
    questionInput.value = "";
    sendBtn.disabled = true;
    sendBtn.textContent = "Đang suy nghĩ...";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          question: question,
          limit: 3,
          max_chars_per_file: 6000
        })
      });

      const data = await res.json();
      addMessage(data.answer || JSON.stringify(data), "bot");
    } catch (err) {
      addMessage("Lỗi kết nối server: " + err.message, "bot");
    }

    sendBtn.disabled = false;
    sendBtn.textContent = "Gửi câu hỏi";
  }
  </script>
</body>
</html>
