version: 1
purpose: dynamic_focus_management
scheduler:
  focus_window_minutes: 45
  review_window_minutes: 15
  max_context_switches_per_hour: 3
policies:
  founder_interrupt_priority: true
  critical_tasks_override: true
  strategic_work_requires_deep_focus: true
recovery:
  restore_context_from_working_memory: true
  fallback_to_episodic_memory: true
