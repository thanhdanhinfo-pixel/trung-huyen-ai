name: Deploy to Cloud Run

on: 
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'app.py'
      - 'mcp.py'
      - 'api/**'
      - 'services/**'
      - 'kernel/**'
      - 'drive.py'
      - 'requirements.txt'
      - 'Dockerfile'
      - 'cloudbuild.yaml'
      - 'openapi-mcp-v3.json'
      - '.github/workflows/deploy-cloud-run.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      SERVICE: trung-huyen-ai
      REGION: asia-southeast1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run from source
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --region "$REGION" \
            --allow-unauthenticated \
            --quiet

      - name: Smoke test MCP ping
        run: |
          URL="https://trung-huyen-ai-779121307308.asia-southeast1.run.app"
          curl -fsS "$URL/mcp/ping"

      - name: Smoke test deployment capabilities
        run: |
          URL="https://trung-huyen-ai-779121307308.asia-southeast1.run.app"
          curl -fsS "$URL/deployment/capabilities"
