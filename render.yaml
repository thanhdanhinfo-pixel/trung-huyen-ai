services:
  - type: web
    name: trung-huyen-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: DRIVE_FOLDER_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
