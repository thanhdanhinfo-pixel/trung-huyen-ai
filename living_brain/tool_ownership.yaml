owner: LIVING_BRAIN
version: 2

capabilities:
  READ_MEMORY:
    owner: LIVING_BRAIN
    tools: [drive, rag]

  WRITE_MEMORY:
    owner: LIVING_BRAIN
    tools: [drive]

  CREATE_CODE:
    owner: LIVING_BRAIN
    tools: [github_create_file, github_upsert_file]

  MODIFY_CODE:
    owner: LIVING_BRAIN
    tools: [github_update_file, patch_file]

  MOVE_CODE:
    owner: LIVING_BRAIN
    tools: [move_file]

  DELETE_CODE:
    owner: LIVING_BRAIN
    tools: [github_delete_file]

  MANAGE_GITHUB:
    owner: LIVING_BRAIN
    tools: [github_read, github_create_file, github_update_file, github_delete_file, move_file]

  OBSERVE_SELF:
    owner: LIVING_BRAIN
    tools: [runtime, health]

  DEPLOY_SYSTEM:
    owner: LIVING_BRAIN
    tools: [cloud_build, cloud_run]

  OBSERVE_RUNTIME:
    owner: LIVING_BRAIN
    tools: [cloud_run_describe, build_status, runtime_logs]

  MANAGE_SECRETS:
    owner: LIVING_BRAIN
    tools: [secret_manager_read, secret_manager_write, cloud_run_secret_bind]

  READ_BUILD_STATUS:
    owner: LIVING_BRAIN
    tools: [build_status]

  READ_DEPLOYMENT_LOGS:
    owner: LIVING_BRAIN
    tools: [runtime_logs]

  EXECUTE_EXTERNAL_ACTION:
    owner: LIVING_BRAIN
    tools: [mcp]

principles:
  - all_tool_access_must_route_through_living_brain
  - all_results_return_to_brain_memory
  - founder_interacts_with_living_brain_not_tools
  - one_capability_one_owner
  - no_direct_worker_to_tool_access
